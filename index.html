<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>共享书架 🌙&🐟</title>
    <style>
        /* --- 视觉风格与全局变量 (明亮浅色/实体书架主题) --- */
        :root {
            --bg-color: #f7f9fa;       
            --panel-bg: #ffffff;       
            --border-color: #e1e4e8;   
            --text-main: #24292e;      
            --text-muted: #586069;     
            --accent-color: #a30000;   
            --accent-hover: #cb2431;
            --danger-color: #cb2431;
            --danger-hover: #b31d28;
            --read-tag: #e6ffed;       
            --read-text: #22863a;      
            --want-tag: #f1f8ff;       
            --want-text: #0366d6;      
            --wood-shelf: #8b5a2b;     
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem 1rem;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- 头部与控制区 --- */
        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 3px double var(--accent-color);
            padding-bottom: 1.2rem;
        }

        header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .actions-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        /* --- 通用按钮样式 --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid #d1d5da;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 38px;
        }

        .btn:hover {
            border-color: var(--text-muted);
            background-color: #f6f8fa;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        .btn-danger {
            color: var(--danger-color);
            border-color: #d1d5da;
        }
        .btn-danger:hover {
            background-color: #ffeef0;
            border-color: var(--danger-color);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            min-height: 30px;
        }

        /* --- 书架与作者卡片 --- */
        .shelf-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .author-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            position: relative;
        }

        .author-card::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: -1px;
            width: calc(100% + 2px);
            height: 8px;
            background: var(--wood-shelf);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.12);
        }

        .author-header {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .author-years {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        /* 专门为排序按钮留出的容器空间 */
        .author-title-wrapper, .order-controls {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* --- 图书列表 --- */
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .book-item {
            display: flex;
            flex-direction: column;
            background: #fafbfc;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            gap: 0.8rem;
        }

        @media (min-width: 600px) {
            .book-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
                gap: 1.5rem;
            }
        }

        .book-info {
            flex-grow: 1;
            min-width: 0;
        }

        .book-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .book-title {
            font-weight: bold;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .tags-wrapper {
            display: inline-flex;
            gap: 0.3rem;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-weight: bold;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .tag-read {
            background-color: var(--read-tag);
            color: var(--read-text);
            border-color: #34d05840;
        }

        .tag-want {
            background-color: var(--want-tag);
            color: var(--want-text);
            border-color: #0366d630;
        }

        /* 共享多批注样式框 */
        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .book-notes {
            font-size: 0.88rem;
            color: var(--text-main);
            background: #fff;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            border: 1px dashed #e1e4e8;
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .notes-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .notes-emoji {
            font-size: 0.95rem;
            user-select: none;
            cursor: pointer;
        }
        
        .notes-text {
            color: var(--text-main);
            word-break: break-all;
        }

        .notes-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85rem;
        }

        /* 操作按钮组在手机和电脑上的兼容排版 */
        .book-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: flex-start;
            border-top: 1px solid #e1e4e860;
            padding-top: 0.6rem;
        }

        @media (min-width: 600px) {
            .book-actions {
                flex-direction: column;
                align-items: flex-end;
                border-top: none;
                padding-top: 0;
                margin-top: 2px;
            }
        }

        /* --- 弹窗/模态框适配手机 --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            justify-content: center;
            align-items: flex-end; /* 手机端抽屉式弹出 */
            z-index: 1000;
        }

        @media (min-width: 600px) {
            .modal {
                align-items: center; /* 网页端居中弹出 */
            }
        }

        .modal-content {
            background-color: var(--panel-bg);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }

        @media (min-width: 600px) {
            .modal-content {
                border-radius: 8px;
                max-width: 500px;
                border: 1px solid #d1d5da;
                box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            }
        }

        .modal-header {
            font-size: 1.15rem;
            margin-bottom: 12rem;
            margin-bottom: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            background-color: #fff;
            border: 1px solid #d1d5da;
            color: var(--text-main);
            padding: 0.55rem;
            border-radius: 4px;
            font-size: 0.95rem;
            -webkit-appearance: none; /* 移除iOS默认内阴影 */
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(163,0,0,0.1);
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-footer {
            display: flex;
            flex-direction: column-reverse; /* 手机上取消键在下面，防止误触 */
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        @media (min-width: 600px) {
            .modal-footer {
                flex-direction: row;
                justify-content: flex-end;
            }
        }

        .modal-footer .btn {
            width: 100%;
        }

        @media (min-width: 600px) {
            .modal-footer .btn {
                width: auto;
            }
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌙&🐟</h1>
            <p>不要再看推理小说了！</p>
        </header>

        <div class="actions-bar">
            <button class="btn btn-primary" onclick="openAddModal()">+ 添加新书</button>
        </div>

        <div id="shelf" class="shelf-container">
            <div class="loading">正在整理书架...</div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">档案录入：添加新书</div>
            <form id="addBookForm" onsubmit="saveNewBook(event)">
                <div class="form-group">
                    <label>作者类型</label>
                    <select id="authorType" class="form-control" onchange="toggleAuthorInput()">
                        <option value="existing">已有作者</option>
                        <option value="new">新作者</option>
                    </select>
                </div>
                
                <div class="form-group" id="existingAuthorGroup">
                    <label>选择或输入选择已有作者（支持输入自动联想）</label>
                    <input type="text" id="bookAuthorSelect" class="form-control" list="authorDatalist" oninput="handleAuthorSelectInput()" placeholder="输入名字自动过滤联想...">
                    <datalist id="authorDatalist"></datalist>
                </div>

                <div id="newAuthorGroup" style="display: none;">
                    <div class="form-group">
                        <label>作者姓名</label>
                        <input type="text" id="newAuthorName" class="form-control">
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>生年</label>
                            <input type="text" id="newAuthorBirth" class="form-control" placeholder="例：1958">
                        </div>
                        <div class="form-group">
                            <label>卒年</label>
                            <input type="text" id="newAuthorDeath" class="form-control" placeholder="健在请留空">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>书名</label>
                    <input type="text" id="bookTitle" class="form-control" required>
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>🌙 阅读状态</label>
                        <select id="bookStatusMoon" class="form-control">
                            <option value="想读">想读</option>
                            <option value="已读">已读</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🐟 阅读状态</label>
                        <select id="bookStatusFish" class="form-control">
                            <option value="想读">想读</option>
                            <option value="已读">已读</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>🌙 的手记批注</label>
                    <textarea id="bookNotesMoon" class="form-control" rows="2" placeholder="写下你的推理或评语..."></textarea>
                </div>
                <div class="form-group">
                    <label>🐟 的手记批注</label>
                    <textarea id="bookNotesFish" class="form-control" rows="2" placeholder="写下你的推理或评语..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('addModal')">取消</button>
                    <button type="submit" class="btn btn-primary">归档入库</button>
                </div>
            </form>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">勘误批注与作者生卒年</div>
            <form id="editNotesForm" onsubmit="saveNotesEdit(event)">
                <input type="hidden" id="editBookId">
                <input type="hidden" id="editAuthorNameHidden">
                <div class="form-group">
                    <label id="editModalBookTitle" style="font-size: 1.1rem; color: var(--text-main); margin-bottom: 0.5rem;"></label>
                </div>
                <div class="form-row-2" style="background: #f6f8fa; padding: 0.8rem; border-radius: 6px; margin-bottom: 1rem;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>作者生年修改</label>
                        <input type="text" id="editAuthorBirth" class="form-control">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>作者卒年修改</label>
                        <input type="text" id="editAuthorDeath" class="form-control" placeholder="健在请留空">
                    </div>
                </div>
                <div class="form-group">
                    <label>🌙 的批注手记</label>
                    <textarea id="editNotesMoonText" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>🐟 的批注手记</label>
                    <textarea id="editNotesFishText" class="form-control" rows="3"></textarea>
                </div>
                <div class="modal-footer" style="justify-content: space-between; flex-direction: row; flex-wrap: wrap;">
                    <button type="button" class="btn btn-danger" onclick="deleteCurrentBook()">销毁此记录</button>
                    <div style="display: flex; gap: 0.5rem; width: 100%; justify-content: flex-end;" class="mobile-grid-fix">
                        <button type="button" class="btn" onclick="closeModal('editModal')" style="width: auto;">取消</button>
                        <button type="submit" class="btn btn-primary" style="width: auto;">保存修改</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        /* ==========================================
         * 1. 配置项与数据适配层 (Data Adapter)
         * ========================================== */
        const CONFIG = {
            API_URL: 'https://sheetdb.io/api/v1/gmckvbct32rf5', 
            USE_LOCAL_MOCK: false 
        };

        const DataAdapter = {
            async fetchAll() {
                if (CONFIG.USE_LOCAL_MOCK) {
                    let localData = localStorage.getItem('mystery_books_shared_v4');
                    if (localData === null) {
                        localData = JSON.stringify([]);
                        localStorage.setItem('mystery_books_shared_v4', localData);
                    }
                    return JSON.parse(localData);
                } else {
                    const response = await fetch(CONFIG.API_URL);
                    return await response.json();
                }
            },

            async create(record) {
                if (CONFIG.USE_LOCAL_MOCK) {
                    const data = await this.fetchAll();
                    record.id = Date.now().toString(); 
                    // 新书入库时初始化排序权重（取最大值+1，放在最后）
                    const maxOrder = data.reduce((max, b) => Math.max(max, parseInt(b.sortOrder || 0)), 0);
                    record.sortOrder = (maxOrder + 1).toString();

                    data.push(record);
                    localStorage.setItem('mystery_books_shared_v4', JSON.stringify(data));
                    return record;
                } else {
                    record.id = Date.now().toString(); 
                    const data = await this.fetchAll();
                    const maxOrder = data.reduce((max, b) => Math.max(max, parseInt(b.sortOrder || 0)), 0);
                    record.sortOrder = (maxOrder + 1).toString();

                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: [record] })
                    });
                    return await response.json();
                }
            },

            async update(id, updatedFields) {
                if (CONFIG.USE_LOCAL_MOCK) {
                    const data = await this.fetchAll();
                    const index = data.findIndex(item => item.id === id);
                    if (index !== -1) {
                        data[index] = { ...data[index], ...updatedFields };
                        localStorage.setItem('mystery_books_shared_v4', JSON.stringify(data));
                    }
                    return data[index];
                } else {
                    const response = await fetch(`${CONFIG.API_URL}/id/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: updatedFields })
                    });
                    return await response.json();
                }
            },

            async delete(id) {
                if (CONFIG.USE_LOCAL_MOCK) {
                    let data = await this.fetchAll();
                    data = data.filter(item => item.id !== id);
                    localStorage.setItem('mystery_books_shared_v4', JSON.stringify(data));
                    return true;
                } else {
                    const response = await fetch(`${CONFIG.API_URL}/id/${id}`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    return await response.json();
                }
            },

            // 批量更新同一作者的生卒年
            async updateAuthorYears(authorName, birth, death) {
                const booksToUpdate = state.books.filter(b => b.authorName === authorName);
                for (let book of booksToUpdate) {
                    await this.update(book.id, { authorBirth: birth, authorDeath: death });
                }
            }
        };

        /* ==========================================
         * 2. 页面业务逻辑与渲染
         * ========================================== */
        let state = { books: [] };
        // 本地临时存储作者的附加信息，用于数据关联和联想记忆
        let globalAuthorMap = {}; 

        document.addEventListener('DOMContentLoaded', refreshData);

        async function refreshData() {
            try {
                showLoading(true);
                state.books = await DataAdapter.fetchAll();
                renderShelf();
                populateAuthorSelect();
            } catch (error) {
                console.error("数据操作失败:", error);
                document.getElementById('shelf').innerHTML = `<div class="loading" style="color:var(--accent-color)">数据加载失败，请刷新重试。</div>`;
            } finally {
                showLoading(false);
            }
        }

        function renderShelf() {
            const shelfEl = document.getElementById('shelf');
            shelfEl.innerHTML = '';

            if (!Array.isArray(state.books) || state.books.length === 0 || state.books[0].id === undefined) {
                shelfEl.innerHTML = '<div class="loading">书架空空如也，等待着新的谜题...</div>';
                return;
            }

            // 数据预处理：优先根据自定义 sortOrder 权重排序（如果没有则按ID兜底）
            const sortedBooks = [...state.books].sort((a, b) => {
                const orderA = parseInt(a.sortOrder || 0);
                const orderB = parseInt(b.sortOrder || 0);
                return orderA !== orderB ? orderA - orderB : a.id.localeCompare(b.id);
            });

            // 依据作者聚合图书，同时保留其出现的先后次序
            const groups = {};
            const authorOrderList = [];

            sortedBooks.forEach(book => {
                const authorKey = book.authorName;
                if (!groups[authorKey]) {
                    groups[authorKey] = {
                        name: book.authorName,
                        birth: book.authorBirth || '',
                        death: book.authorDeath || '',
                        books: [],
                        // 记录该作者所有书里的最小次序，作为作者整体之间的排序参考
                        minSortOrder: parseInt(book.sortOrder || 0) 
                    };
                    authorOrderList.push(authorKey);
                } else {
                    groups[authorKey].minSortOrder = Math.min(groups[authorKey].minSortOrder, parseInt(book.sortOrder || 0));
                }
                groups[authorKey].books.push(book);
            });

            // 将作者组按照其组内图书的最小 sortOrder 进行排序
            const sortedGroupArray = Object.values(groups).sort((a, b) => a.minSortOrder - b.minSortOrder);

            sortedGroupArray.forEach((group, groupIdx) => {
                let yearsStr = '';
                if (group.birth && group.death) {
                    yearsStr = `(${group.birth}-${group.death})`;
                } else if (group.birth) {
                    yearsStr = `(${group.birth} ~ 至今)`;
                }

                const authorCard = document.createElement('div');
                authorCard.className = 'author-card';

                let booksHTML = '';
                group.books.forEach((book, bookIdx) => {
                    const statusMoon = book.statusMoon || '想读';
                    const statusFish = book.statusFish || '想读';

                    const tagMoonClass = statusMoon === '已读' ? 'tag-read' : 'tag-want';
                    const tagFishClass = statusFish === '已读' ? 'tag-read' : 'tag-want';

                    const nextMoonStatus = statusMoon === '已读' ? '想读' : '已读';
                    const nextFishStatus = statusFish === '已读' ? '想读' : '已读';
                    
                    const moonNotesRender = book.notesMoon ? escapeHtml(book.notesMoon) : '<span class="notes-empty">期待手记录入...</span>';
                    const fishNotesRender = book.notesFish ? escapeHtml(book.notesFish) : '<span class="notes-empty">期待手记录入...</span>';

                    booksHTML += `
                        <div class="book-item">
                            <div class="book-info">
                                <div class="book-title-row">
                                    <span class="book-title">《${escapeHtml(book.bookTitle)}》</span>
                                    <div class="tags-wrapper">
                                        <span class="tag ${tagMoonClass}">🌙 ${statusMoon}</span>
                                        <span class="tag ${tagFishClass}">🐟 ${statusFish}</span>
                                    </div>
                                </div>
                                <div class="notes-container">
                                    <div class="book-notes">
                                        <div class="notes-profile">
                                            <span class="notes-emoji" onclick="fastToggleStatus('${book.id}', 'Moon', '${nextMoonStatus}')" title="点击快速切换状态">🌙</span>
                                        </div>
                                        <span class="notes-text">${moonNotesRender}</span>
                                    </div>
                                    <div class="book-notes">
                                        <div class="notes-profile">
                                            <span class="notes-emoji" onclick="fastToggleStatus('${book.id}', 'Fish', '${nextFishStatus}')" title="点击快速切换状态">🐟</span>
                                        </div>
                                        <span class="notes-text">${fishNotesRender}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="book-actions">
                                <div class="order-controls" style="margin-bottom: 0.2rem;">
                                    <button class="btn btn-sm" onclick="moveBook('${book.id}', 'up')" title="书籍上移" ${bookIdx === 0 && groupIdx === 0 ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>↑</button>
                                    <button class="btn btn-sm" onclick="moveBook('${book.id}', 'down')" title="书籍下移" ${bookIdx === group.books.length - 1 && groupIdx === sortedGroupArray.length - 1 ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>↓</button>
                                </div>
                                <button class="btn btn-sm" onclick="fastToggleStatus('${book.id}', 'Moon', '${nextMoonStatus}')">🌙→${nextMoonStatus}</button>
                                <button class="btn btn-sm" onclick="fastToggleStatus('${book.id}', 'Fish', '${nextFishStatus}')">🐟→${nextFishStatus}</button>
                                <button class="btn btn-sm btn-primary" onclick="openEditModal('${book.id}', '${escapeJs(book.bookTitle)}', '${escapeJs(book.notesMoon || '')}', '${escapeJs(book.notesFish || '')}', '${escapeJs(group.name)}', '${escapeJs(group.birth)}', '${escapeJs(group.death)}')">
                                    勘误批注
                                </button>
                            </div>
                        </div>
                    `;
                });

                authorCard.innerHTML = `
                    <h3 class="author-header">
                        <div class="author-title-wrapper">
                            <span>${escapeHtml(group.name)}</span>
                            <span class="author-years">${yearsStr}</span>
                        </div>
                        <div class="order-controls">
                            <button class="btn btn-sm" onclick="moveAuthor('${escapeJs(group.name)}', 'up')" title="作者整体上移" ${groupIdx === 0 ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>上移作者 ↑</button>
                            <button class="btn btn-sm" onclick="moveAuthor('${escapeJs(group.name)}', 'down')" title="作者整体下移" ${groupIdx === sortedGroupArray.length - 1 ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''}>下移作者 ↓</button>
                        </div>
                    </h3>
                    <div class="book-list">
                        ${booksHTML}
                    </div>
                `;
                shelfEl.appendChild(authorCard);
            });
        }

        function populateAuthorSelect() {
            const datalist = document.getElementById('authorDatalist');
            datalist.innerHTML = '';
            globalAuthorMap = {}; 
            
            const authors = [];
            const seen = new Set();
            if(Array.isArray(state.books)) {
                state.books.forEach(b => {
                    if (b.authorName && !seen.has(b.authorName)) {
                        seen.add(b.authorName);
                        authors.push({ name: b.authorName, birth: b.authorBirth, death: b.authorDeath });
                        // 建立本地映射字典方便联想选择时取生卒年
                        globalAuthorMap[b.authorName] = { birth: b.authorBirth || '', death: b.authorDeath || '' };
                    }
                });
            }

            if(authors.length === 0) {
                document.getElementById('bookAuthorSelect').placeholder = "暂无已有作者，请切换新作者选项";
                document.getElementById('authorType').value = 'new';
                toggleAuthorInput();
                return;
            }

            authors.forEach(auth => {
                const opt = document.createElement('option');
                opt.value = auth.name;
                // 利用 label 辅助用户查看已有信息
                opt.label = auth.birth ? `生年: ${auth.birth}` : '健在/未知';
                datalist.appendChild(opt);
            });
        }

        // 当用户在联想输入框中输入内容时触发检查，如果完全匹配已存在的作者，可以记录或响应
        function handleAuthorSelectInput() {
            // 保留此空钩子以支持未来扩展，不干扰现有逻辑
        }

        /* ==========================================
         * 3. 交互行为 与 增设的排序控制核心
         * ========================================== */
        
        // 核心排序函数：单本图书上下移动
        async function moveBook(bookId, direction) {
            // 获取全量扁平化并排序过后的图书副本
            const sortedBooks = [...state.books].sort((a, b) => {
                const orderA = parseInt(a.sortOrder || 0);
                const orderB = parseInt(b.sortOrder || 0);
                return orderA !== orderB ? orderA - orderB : a.id.localeCompare(b.id);
            });

            const index = sortedBooks.findIndex(b => b.id === bookId);
            if (index === -1) return;

            let targetIndex = direction === 'up' ? index - 1 : index + 1;
            if (targetIndex < 0 || targetIndex >= sortedBooks.length) return;

            const currentBook = sortedBooks[index];
            const targetBook = sortedBooks[targetIndex];

            // 互换两个记录在云端的 sortOrder 权重值
            const currentOrder = currentBook.sortOrder || "0";
            const targetOrder = targetBook.sortOrder || "0";

            try {
                showLoading(true);
                // 执行并行异步更新，将两个权重值置换
                await Promise.all([
                    DataAdapter.update(currentBook.id, { sortOrder: targetOrder }),
                    DataAdapter.update(targetBook.id, { sortOrder: currentOrder })
                ]);
                await refreshData();
            } catch (e) {
                alert("调整顺序失败，请重试。");
            } finally {
                showLoading(false);
            }
        }

        // 核心排序函数：作者卡片整体批量上下移动
        async function moveAuthor(authorName, direction) {
            // 首先对图书按当前位置展开分类排序
            const sortedBooks = [...state.books].sort((a, b) => {
                const orderA = parseInt(a.sortOrder || 0);
                const orderB = parseInt(b.sortOrder || 0);
                return orderA !== orderB ? orderA - orderB : a.id.localeCompare(b.id);
            });

            // 抓取出所有出场作者的先后独立顺序
            const authorsOrder = [];
            sortedBooks.forEach(b => {
                if (!authorsOrder.includes(b.authorName)) {
                    authorsOrder.push(b.authorName);
                }
            });

            const index = authorsOrder.indexOf(authorName);
            if (index === -1) return;

            let targetIndex = direction === 'up' ? index - 1 : index + 1;
            if (targetIndex < 0 || targetIndex >= authorsOrder.length) return;

            const targetAuthorName = authorsOrder[targetIndex];

            // 筛出两个作者各自名下的所有书籍
            const currentAuthorBooks = sortedBooks.filter(b => b.authorName === authorName);
            const targetAuthorBooks = sortedBooks.filter(b => b.authorName === targetAuthorName);

            // 收集两个作者涉及的所有旧 sortOrder 权重总池子
            const allOrders = [...currentAuthorBooks, ...targetAuthorBooks]
                              .map(b => parseInt(b.sortOrder || 0))
                              .sort((a, b) => a - b);

            try {
                showLoading(true);
                const updatePromises = [];
                
                // 将排序权重池重新按期望分配给两个组合：上移则当前作者分前半段，下移则分后半段
                if (direction === 'up') {
                    currentAuthorBooks.forEach((b, i) => {
                        updatePromises.push(DataAdapter.update(b.id, { sortOrder: allOrders[i].toString() }));
                    });
                    targetAuthorBooks.forEach((b, i) => {
                        updatePromises.push(DataAdapter.update(b.id, { sortOrder: allOrders[currentAuthorBooks.length + i].toString() }));
                    });
                } else {
                    targetAuthorBooks.forEach((b, i) => {
                        updatePromises.push(DataAdapter.update(b.id, { sortOrder: allOrders[i].toString() }));
                    });
                    currentAuthorBooks.forEach((b, i) => {
                        updatePromises.push(DataAdapter.update(b.id, { sortOrder: allOrders[targetAuthorBooks.length + i].toString() }));
                    });
                }

                await Promise.all(updatePromises);
                await refreshData();
            } catch (e) {
                alert("调整作者顺序失败。");
            } finally {
                showLoading(false);
            }
        }

        async function fastToggleStatus(id, person, nextStatus) {
            try {
                showLoading(true);
                const updateField = person === 'Moon' ? { statusMoon: nextStatus } : { statusFish: nextStatus };
                await DataAdapter.update(id, updateField);
                await refreshData();
            } catch (e) {
                alert("变更状态失败。");
            } finally {
                showLoading(false);
            }
        }

        async function saveNotesEdit(event) {
            event.preventDefault();
            const id = document.getElementById('editBookId').value;
            const authorName = document.getElementById('editAuthorNameHidden').value;
            const birth = document.getElementById('editAuthorBirth').value.trim();
            const death = document.getElementById('editAuthorDeath').value.trim();
            const notesMoon = document.getElementById('editNotesMoonText').value;
            const notesFish = document.getElementById('editNotesFishText').value;

            try {
                closeModal('editModal');
                showLoading(true);
                await DataAdapter.update(id, { notesMoon, notesFish });
                await DataAdapter.updateAuthorYears(authorName, birth, death);
                await refreshData();
            } catch (e) {
                alert("保存失败。");
            } finally {
                showLoading(false);
            }
        }

        async function saveNewBook(event) {
            event.preventDefault();
            
            const authorType = document.getElementById('authorType').value;
            let authorName, authorBirth, authorDeath;

            if (authorType === 'existing') {
                const inputVal = document.getElementById('bookAuthorSelect').value.trim();
                if(!inputVal) { alert('请先选择或输入一位已有作者。'); return; }
                authorName = inputVal;
                
                // 如果输入的已有作者在前端字典中存在，自动继承其生卒年数据
                if (globalAuthorMap[authorName]) {
                    authorBirth = globalAuthorMap[authorName].birth;
                    authorDeath = globalAuthorMap[authorName].death;
                } else {
                    authorBirth = '';
                    authorDeath = '';
                }
            } else {
                authorName = document.getElementById('newAuthorName').value.trim();
                authorBirth = document.getElementById('newAuthorBirth').value.trim();
                authorDeath = document.getElementById('newAuthorDeath').value.trim();
                if (!authorName) { alert('请输入作者姓名。'); return; }
            }

            const bookTitle = document.getElementById('bookTitle').value.trim();

            const isDuplicate = state.books.some(b => 
                b.authorName.toLowerCase() === authorName.toLowerCase() && 
                b.bookTitle.toLowerCase() === bookTitle.toLowerCase()
            );
            if (isDuplicate) {
                alert(`档案查重提示：\n该作者旗下已存在《${bookTitle}》的记录，请勿重复录入！`);
                return;
            }

            const newBook = {
                authorName,
                authorBirth,
                authorDeath,
                bookTitle,
                statusMoon: document.getElementById('bookStatusMoon').value,
                statusFish: document.getElementById('bookStatusFish').value,
                notesMoon: document.getElementById('bookNotesMoon').value.trim(),
                notesFish: document.getElementById('bookNotesFish').value.trim()
            };

            try {
                closeModal('addModal');
                showLoading(true);
                await DataAdapter.create(newBook);
                document.getElementById('addBookForm').reset();
                toggleAuthorInput(); 
                await refreshData();
            } catch (e) {
                alert("新书录入失败。");
            } finally {
                showLoading(false);
            }
        }

        async function deleteCurrentBook() {
            const id = document.getElementById('editBookId').value;
            if (!id) return;
            
            if (confirm("确定要彻底销毁这本图书的归档档案吗？此操作无法撤销。")) {
                try {
                    closeModal('editModal');
                    showLoading(true);
                    await DataAdapter.delete(id);
                    await refreshData();
                } catch(e) {
                    alert("销毁记录失败。");
                } finally {
                    showLoading(false);
                }
            }
        }

        /* ==========================================
         * 4. 辅助视图与弹窗全局控制函数
         * ========================================== */
        function openAddModal() {
            document.getElementById('addBookForm').reset();
            populateAuthorSelect();
            toggleAuthorInput();
            document.getElementById('addModal').style.display = 'flex';
        }

        function openEditModal(id, title, notesMoon, notesFish, authorName, birth, death) {
            document.getElementById('editBookId').value = id;
            document.getElementById('editAuthorNameHidden').value = authorName;
            document.getElementById('editModalBookTitle').textContent = `《${title}》`;
            document.getElementById('editAuthorBirth').value = birth;
            document.getElementById('editAuthorDeath').value = death;
            document.getElementById('editNotesMoonText').value = notesMoon;
            document.getElementById('editNotesFishText').value = notesFish;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function toggleAuthorInput() {
            const type = document.getElementById('authorType').value;
            if (type === 'existing') {
                document.getElementById('existingAuthorGroup').style.display = 'block';
                document.getElementById('newAuthorGroup').style.display = 'none';
            } else {
                document.getElementById('existingAuthorGroup').style.display = 'none';
                document.getElementById('newAuthorGroup').style.display = 'block';
            }
        }

        function showLoading(show) {
            const shelf = document.getElementById('shelf');
            if (show) {
                if (shelf.innerHTML === '' || shelf.querySelector('.loading')) {
                    shelf.innerHTML = '<div class="loading">正在更新数据，请稍候...</div>';
                }
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        function escapeJs(str) {
            if (!str) return '';
            return str.replace(/\\/g, '\\\\')
                      .replace(/'/g, "\\'")
                      .replace(/"/g, '\\"')
                      .replace(/\n/g, '\\n')
                      .replace(/\r/g, '\\r');
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
