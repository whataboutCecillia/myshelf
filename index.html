<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>共享书架 🌙&🐟</title>
    <style>
        /* --- 视觉风格与全局变量 (明亮浅色/实体书架主题) --- */
        :root {
            --bg-color: #f7f9fa;       
            --panel-bg: #ffffff;       
            --border-color: #e1e4e8;   
            --text-main: #24292e;      
            --text-muted: #586069;     
            --accent-color: #a30000;   
            --accent-hover: #cb2431;
            --danger-color: #cb2431;
            --danger-hover: #b31d28;
            --read-tag: #e6ffed;       
            --read-text: #22863a;      
            --want-tag: #f1f8ff;       
            --want-text: #0366d6;      
            --wood-shelf: #8b5a2b;     
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem 1rem;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- 头部与控制区 --- */
        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 3px double var(--accent-color);
            padding-bottom: 1.2rem;
        }

        header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .actions-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        /* --- 通用按钮样式 --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid #d1d5da;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 38px;
        }

        .btn:hover {
            border-color: var(--text-muted);
            background-color: #f6f8fa;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        .btn-danger {
            color: var(--danger-color);
            border-color: #d1d5da;
        }
        .btn-danger:hover {
            background-color: #ffeef0;
            border-color: var(--danger-color);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            min-height: 30px;
        }

        /* --- 书架与作者卡片 --- */
        .shelf-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .author-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            position: relative;
        }

        .author-card::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: -1px;
            width: calc(100% + 2px);
            height: 8px;
            background: var(--wood-shelf);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.12);
        }

        .author-header {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .author-years {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        /* --- 图书列表 --- */
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .book-item {
            display: flex;
            flex-direction: column;
            background: #fafbfc;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            gap: 0.8rem;
        }

        @media (min-width: 600px) {
            .book-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
                gap: 1.5rem;
            }
        }

        .book-info {
            flex-grow: 1;
            min-width: 0;
        }

        .book-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .book-title {
            font-weight: bold;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .tags-wrapper {
            display: inline-flex;
            gap: 0.3rem;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-weight: bold;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .tag-read {
            background-color: var(--read-tag);
            color: var(--read-text);
            border-color: #34d05840;
        }

        .tag-want {
            background-color: var(--want-tag);
            color: var(--want-text);
            border-color: #0366d630;
        }

        /* 共享多批注样式框 */
        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .book-notes {
            font-size: 0.88rem;
            color: var(--text-main);
            background: #fff;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            border: 1px dashed #e1e4e8;
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .notes-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .notes-emoji {
            font-size: 0.95rem;
            user-select: none;
            cursor: pointer;
        }
        
        .notes-text {
            color: var(--text-main);
            word-break: break-all;
            white-space: pre-wrap; /* 允许手记换行展示 */
        }

        .notes-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.85rem;
        }

        /* 操作按钮组在手机和电脑上的兼容排版 */
        .book-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: flex-start;
            border-top: 1px solid #e1e4e860;
            padding-top: 0.6rem;
        }

        @media (min-width: 600px) {
            .book-actions {
                flex-direction: column;
                align-items: flex-end;
                border-top: none;
                padding-top: 0;
                margin-top: 2px;
            }
        }

        /* --- 弹窗/模态框适配手机 --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            justify-content: center;
            align-items: flex-end; 
            z-index: 1000;
        }

        @media (min-width: 600px) {
            .modal {
                align-items: center; 
            }
        }

        .modal-content {
            background-color: var(--panel-bg);
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            padding: 1.5rem;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }

        @media (min-width: 600px) {
            .modal-content {
                border-radius: 8px;
                max-width: 500px;
                border: 1px solid #d1d5da;
                box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            }
        }

        .modal-header {
            font-size: 1.15rem;
            margin-bottom: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
            font-weight: bold;
        }

        .form-control {
            width: 100%;
            background-color: #fff;
            border: 1px solid #d1d5da;
            color: var(--text-main);
            padding: 0.55rem;
            border-radius: 4px;
            font-size: 0.95rem;
            -webkit-appearance: none; 
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(163,0,0,0.1);
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-footer {
            display: flex;
            flex-direction: column-reverse; 
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        @media (min-width: 600px) {
            .modal-footer {
                flex-direction: row;
                justify-content: flex-end;
            }
        }

        .modal-footer .btn {
            width: 100%;
        }

        @media (min-width: 600px) {
            .modal-footer .btn {
                width: auto;
            }
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🌙&🐟</h1>
            <p>不要再看推理小说了！</p>
        </header>

        <div class="actions-bar">
            <button class="btn btn-primary" onclick="openAddModal()">+ 添加新书</button>
        </div>

        <div id="shelf" class="shelf-container">
            <div class="loading">正在整理书架...</div>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">档案录入：添加新书</div>
            <form id="addBookForm" onsubmit="saveNewBook(event)">
                <div class="form-group">
                    <label>作者类型</label>
                    <select id="authorType" class="form-control" onchange="toggleAuthorInput()">
                        <option value="existing">已有作者</option>
                        <option value="new">新作者</option>
                    </select>
                </div>
                
                <div class="form-group" id="existingAuthorGroup">
                    <label>选择作者</label>
                    <select id="bookAuthorSelect" class="form-control"></select>
                </div>

                <div id="newAuthorGroup" style="display: none;">
                    <div class="form-group">
                        <label>作者姓名</label>
                        <input type="text" id="newAuthorName" class="form-control">
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label>生年</label>
                            <input type="text" id="newAuthorBirth" class="form-control" placeholder="例：1958">
                        </div>
                        <div class="form-group">
                            <label>卒年</label>
                            <input type="text" id="newAuthorDeath" class="form-control" placeholder="健在请留空">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>书名</label>
                    <input type="text" id="bookTitle" class="form-control" required>
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label>🌙 阅读状态</label>
                        <select id="bookStatusMoon" class="form-control">
                            <option value="想读">想读</option>
                            <option value="已读">已读</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🐟 阅读状态</label>
                        <select id="bookStatusFish" class="form-control">
                            <option value="想读">想读</option>
                            <option value="已读">已读</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>🌙 的手记批注</label>
                    <textarea id="bookNotesMoon" class="form-control" rows="2" placeholder="写下你的推理或评语..."></textarea>
                </div>
                <div class="form-group">
                    <label>🐟 的手记批注</label>
                    <textarea id="bookNotesFish" class="form-control" rows="2" placeholder="写下你的推理或评语..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('addModal')">取消</button>
                    <button type="submit" class="btn btn-primary">归档入库</button>
                </div>
            </form>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">勘误批注与作者生卒年</div>
            <form id="editNotesForm" onsubmit="saveNotesEdit(event)">
                <input type="hidden" id="editBookId">
                <input type="hidden" id="editAuthorNameHidden">
                <div class="form-group">
                    <label id="editModalBookTitle" style="font-size: 1.1rem; color: var(--text-main); margin-bottom: 0.5rem;"></label>
                </div>
                <div class="form-row-2" style="background: #f6f8fa; padding: 0.8rem; border-radius: 6px; margin-bottom: 1rem;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>作者生年修改</label>
                        <input type="text" id="editAuthorBirth" class="form-control">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>作者卒年修改</label>
                        <input type="text" id="editAuthorDeath" class="form-control" placeholder="健在请留空">
                    </div>
                </div>
                <div class="form-group">
                    <label>🌙 的批注手记</label>
                    <textarea id="editNotesMoonText" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>🐟 的批注手记</label>
                    <textarea id="editNotesFishText" class="form-control" rows="3"></textarea>
                </div>
                <div class="modal-footer" style="justify-content: space-between; flex-direction: row; flex-wrap: wrap;">
                    <button type="button" class="btn btn-danger" onclick="deleteCurrentBook()">销毁此记录</button>
                    <div style="display: flex; gap: 0.5rem; width: 100%; justify-content: flex-end;" class="mobile-grid-fix">
                        <button type="button" class="btn" onclick="closeModal('editModal')" style="width: auto;">取消</button>
                        <button type="submit" class="btn btn-primary" style="width: auto;">保存修改</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        /* ==========================================
         * 1. 配置项与数据适配层 (Data Adapter)
         * ========================================== */
        const CONFIG = {
            API_URL: 'https://sheetdb.io/api/v1/gmckvbct32rf5', 
            USE_LOCAL_MOCK: false 
        };

        const DataAdapter = {
            async fetchAll() {
                if (CONFIG.USE_LOCAL_MOCK) {
                    let localData = localStorage.getItem('mystery_books_shared_v5');
                    if (localData === null) {
                        localData = JSON.stringify([]);
                        localStorage.setItem('mystery_books_shared_v5', localData);
                    }
                    return JSON.parse(localData);
                } else {
                    const response = await fetch(CONFIG.API_URL);
                    return await response.json();
                }
            },

            async create(record) {
                if (CONFIG.USE_LOCAL_MOCK) {
                    const data = await this.fetchAll();
                    record.id = Date.now().toString(); 
                    data.push(record);
                    localStorage.setItem('mystery_books_shared_v5', JSON.stringify(data));
                    return record;
                } else {
                    record.id = Date.now().toString(); 
                    const response = await fetch(CONFIG.API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: [record] })
                    });
                    return await response.json();
                }
            },

            async update(id, updatedFields) {
                if (CONFIG.USE_LOCAL_MOCK) {
                    const data = await this.fetchAll();
                    const index = data.findIndex(item => item.id === String(id));
                    if (index !== -1) {
                        data[index] = { ...data[index], ...updatedFields };
                        localStorage.setItem('mystery_books_shared_v5', JSON.stringify(data));
                    }
                    return data[index];
                } else {
                    const response = await fetch(`${CONFIG.API_URL}/id/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: updatedFields })
                    });
                    return await response.json();
                }
            },

            async delete(id) {
                if (CONFIG.USE_LOCAL_MOCK) {
                    let data = await this.fetchAll();
                    data = data.filter(item => item.id !== String(id));
                    localStorage.setItem('mystery_books_shared_v5', JSON.stringify(data));
                    return true;
                } else {
                    const response = await fetch(`${CONFIG.API_URL}/id/${id}`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' }
                    });
                    return await response.json();
                }
            },

            async updateAuthorYears(authorName, birth, death) {
                const booksToUpdate = state.books.filter(b => b.authorName === authorName);
                for (let book of booksToUpdate) {
                    await this.update(book.id, { authorBirth: birth, authorDeath: death });
                }
            }
        };

        /* =================================
