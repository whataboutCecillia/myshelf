<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>共享书架 🌙&🐟</title>
    <style>
        /* --- 视觉风格与全局变量 (明亮浅色/实体书架主题) --- */
        :root {
            --bg-color: #f7f9fa;       
            --panel-bg: #ffffff;       
            --border-color: #e1e4e8;   
            --text-main: #24292e;      
            --text-muted: #586069;     
            --accent-color: #a30000;   
            --accent-hover: #cb2431;
            --danger-color: #cb2431;
            --danger-hover: #b31d28;
            --read-tag: #e6ffed;       
            --read-text: #22863a;      
            --want-tag: #f1f8ff;       
            --want-text: #0366d6;      
            --wood-shelf: #8b5a2b;     
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            padding: 1.5rem 1rem;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- 头部与控制区 --- */
        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 3px double var(--accent-color);
            padding-bottom: 1.2rem;
        }

        header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent-color);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .actions-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        /* --- 通用按钮样式 --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--panel-bg);
            color: var(--text-main);
            border: 1px solid #d1d5da;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 38px;
        }

        .btn:hover {
            border-color: var(--text-muted);
            background-color: #f6f8fa;
        }

        .btn-primary {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        .btn-danger {
            color: var(--danger-color);
            border-color: #d1d5da;
        }
        .btn-danger:hover {
            background-color: #ffeef0;
            border-color: var(--danger-color);
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.8rem;
            min-height: 30px;
        }

        /* --- 书架与作者卡片 --- */
        .shelf-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        .author-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-top: 4px solid var(--accent-color);
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            position: relative;
        }

        .author-card::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: -1px;
            width: calc(100% + 2px);
            height: 8px;
            background: var(--wood-shelf);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.12);
        }

        .author-header {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .author-years {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: normal;
        }

        /* --- 图书列表 --- */
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .book-item {
            display: flex;
            flex-direction: column;
            background: #fafbfc;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            gap: 0.8rem;
        }

        @media (min-width: 600px) {
            .book-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
                gap: 1.5rem;
            }
        }

        .book-info {
            flex-grow: 1;
            min-width: 0;
        }

        .book-title-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .book-title {
            font-weight: bold;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .tags-wrapper {
            display: inline-flex;
            gap: 0.3rem;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-weight: bold;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .tag-read {
            background-color: var(--read-tag);
            color: var(--read-text);
            border-color: #34d05840;
        }

        .tag-want {
            background-color: var(--want-tag);
            color: var(--want-text);
            border-color: #0366d630;
        }

        /* 共享多批注样式框 */
        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .book-notes {
            font-size: 0.88rem;
            color: var(--text-main);
            background: #fff;
            padding: 0.4rem 0.6rem;
            border-radius: 4px;
            border: 1px dashed #e1e4e8;
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
        }

        .notes-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
